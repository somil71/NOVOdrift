<div class="absolute bottom-huge left-xl z-20">
<h1 class="font-display text-display text-on-surface mb-xs tracking-tight">FITBOARD</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm">Curate your aesthetic. Discover the cutting edge of digital fashion expression.</p>
</div>

<!-- Right Interactive Pane -->
<div class="w-full md:w-1/2 h-full bg-background flex flex-col justify-center items-center p-lg relative">
<!-- Mobile Brand (Visible only when left pane is hidden) -->
<div class="md:hidden absolute top-xl left-lg right-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">FITBOARD</h1>
</div>
<div class="w-full max-w-[400px]">
<!-- Tab Navigation -->
<div class="flex border-b border-outline-variant mb-xl">
<button class="flex-1 pb-sm font-headline-sm text-headline-sm text-on-surface border-b-2 border-secondary transition-colors" id="tab-login" onclick="switchTab('login')">
                    Sign In
                </button>
<button class="flex-1 pb-sm font-headline-sm text-headline-sm text-on-surface-variant border-b-2 border-transparent hover:text-on-surface transition-colors" id="tab-signup" onclick="switchTab('signup')">
                    Create Account
                </button>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-lg animate-in fade-in duration-300" id="form-login">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="login-email">Email Address</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-tertiary focus:ring-1 focus:ring-tertiary focus:outline-none transition-all" id="login-email" placeholder="Enter your email" type="email">
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="login-password">Password</label>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-tertiary focus:ring-1 focus:ring-tertiary focus:outline-none transition-all" id="login-password" placeholder="Enter your password" type="password">
</div>
<div class="pt-sm flex flex-col gap-md">
<button class="w-full bg-secondary text-on-secondary font-headline-sm text-headline-sm py-sm rounded-DEFAULT hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-xs" type="button">
                        Sign In <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative flex items-center py-xs">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-md font-label-caps text-label-caps text-outline uppercase">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-transparent border border-outline text-on-surface font-headline-sm text-headline-sm py-sm rounded-DEFAULT hover:bg-surface-container-high transition-colors flex justify-center items-center gap-sm" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="account_circle">account_circle</span> Google
                    </button>
</div>
</form>
<!-- Signup Form (Hidden by default) -->

</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="signup-email">Email Address</label>

</div>

</div>

<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-on-surface underline decoration-outline-variant hover:decoration-secondary transition-colors" href="#">Terms of Service</a> and <a class="text-on-surface underline decoration-outline-variant hover:decoration-secondary transition-colors" href="#">Privacy Policy</a>.
                    </label>
</div>
<div class="pt-sm">
<button class="w-full bg-secondary text-on-secondary font-headline-sm text-headline-sm py-sm rounded-DEFAULT hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-xs" type="button">
                        Create Account <span class="material-symbols-outlined text-[18px]" data-icon="how_to_reg">how_to_reg</span>
</button>
</div>
</form>
</div>
</div>
<script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const signupForm = document.getElementById('form-signup');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                loginForm.classList.add('flex');
                signupForm.classList.add('hidden');
                signupForm.classList.remove('flex');

                tabLogin.classList.add('border-secondary', 'text-on-surface');
                tabLogin.classList.remove('border-transparent', 'text-on-surface-variant');
                tabSignup.classList.remove('border-secondary', 'text-on-surface');
                tabSignup.classList.add('border-transparent', 'text-on-surface-variant');
            } else {
                signupForm.classList.remove('hidden');
                signupForm.classList.add('flex');
                loginForm.classList.add('hidden');
                loginForm.classList.remove('flex');

                tabSignup.classList.add('border-secondary', 'text-on-surface');
                tabSignup.classList.remove('border-transparent', 'text-on-surface-variant');
                tabLogin.classList.remove('border-secondary', 'text-on-surface');
                tabLogin.classList.add('border-transparent', 'text-on-surface-variant');
            }
        }
    </script>
